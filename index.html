<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>气VENØM三ノ乙 | Cyber Terminal</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
color:#00ffcc;
font-family:Arial, sans-serif;
text-align:center;
overflow-x:hidden;
}

/* ===== MATRIX CANVAS ===== */
canvas{
position:fixed;
top:0;
left:0;
z-index:-2;
}

/* ===== DIGITAL SCAN LINES ===== */
body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:repeating-linear-gradient(
to bottom,
rgba(0,255,200,0.04) 0px,
rgba(0,255,200,0.04) 1px,
transparent 1px,
transparent 3px
);
pointer-events:none;
z-index:5;
}

/* ===== LOADER ===== */
#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
color:#00ffcc;
font-family:monospace;
animation:fadeOut 1s ease forwards;
animation-delay:3s;
}

.loader-text{
margin-bottom:15px;
animation:blink 1s infinite;
}

.loading-bar{
width:250px;
height:6px;
background:#111;
border-radius:10px;
overflow:hidden;
}

.loading-progress{
height:100%;
width:0;
background:#00ffcc;
animation:load 3s forwards;
}

@keyframes load{
to{width:100%;}
}

@keyframes fadeOut{
to{
opacity:0;
visibility:hidden;
}
}

@keyframes blink{
50%{opacity:0.4;}
}

/* CONTENT */
.container{
padding:80px 20px;
position:relative;
z-index:2;
}

/* PROFILE */
.profile-img{
width:150px;
height:150px;
border-radius:50%;
border:3px solid #00ffcc;
box-shadow:
0 0 10px #00ffcc,
0 0 25px #00ffcc;
margin-bottom:25px;
}

/* ===== CLEAN CYBER NAME EFFECT ===== */
.glitch{
position:relative;
font-size:40px;
font-weight:bold;
color:#00ffcc;
letter-spacing:2px;
text-shadow:
0 0 5px #00ffcc,
0 0 15px #00ffcc,
0 0 25px #00ffcc;
animation:softFlicker 3s infinite alternate;
}

.glitch::before,
.glitch::after{
content:attr(data-text);
position:absolute;
left:0;
top:0;
width:100%;
opacity:0.25;
}

.glitch::before{
color:#00ffff;
animation:glitchShift1 3s infinite alternate;
}

.glitch::after{
color:#00ffaa;
animation:glitchShift2 2.5s infinite alternate;
}

@keyframes glitchShift1{
0%{transform:translate(0);}
50%{transform:translate(-1px,1px);}
100%{transform:translate(0);}
}

@keyframes glitchShift2{
0%{transform:translate(0);}
50%{transform:translate(1px,-1px);}
100%{transform:translate(0);}
}

@keyframes softFlicker{
0%,100%{opacity:1;}
50%{opacity:0.92;}
}

.subtitle{
color:#aaa;
margin:15px 0 30px;
}

/* BUTTONS */
.buttons{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
margin-bottom:40px;
}

button{
padding:12px 25px;
font-size:15px;
background:#00ffcc;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 15px #00ffcc;
}

/* TERMINAL */
.terminal{
background:#000;
border:1px solid #00ffcc;
padding:20px;
max-width:600px;
margin:40px auto;
font-family:monospace;
color:#00ffcc;
box-shadow:0 0 20px #00ffcc;
min-height:120px;
text-align:left;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div id="loader">
<div class="loader-text">Booting Cyber Interface...</div>
<div class="loading-bar">
<div class="loading-progress"></div>
</div>
</div>

<div class="container">

<img src="profile.jpg" class="profile-img">

<h1 class="glitch" data-text="Hi, I'm 气VENØM三ノ乙">
Hi, I'm 气VENØM三ノ乙
</h1>

<p class="subtitle">
Learning, building, and experimenting with code & security.
</p>

<div class="buttons">
<a href="http://t.me/BGMI_X_VENOM" target="_blank"><button>Telegram</button></a>
<a href="https://github.com/BGMIxVENOM" target="_blank"><button>GitHub</button></a>
<a href="https://www.facebook.com/BGMI.Pritam.Halder" target="_blank"><button>Facebook</button></a>
<a href="https://wa.me/916289716808" target="_blank"><button>WhatsApp</button></a>
</div>

<div class="terminal" id="terminal"></div>

</div>

<script>

/* MATRIX RAIN */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "アァイィウヴエカキクケコサシスセソ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const fontSize = 14;
const columns = canvas.width / fontSize;

const drops = [];
for(let x = 0; x < columns; x++){
drops[x] = 1;
}

function drawMatrix(){
ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
ctx.fillRect(0, 0, canvas.width, canvas.height);

ctx.fillStyle = "#00ffcc";
ctx.font = fontSize + "px monospace";

for(let i = 0; i < drops.length; i++){
const text = letters.charAt(Math.floor(Math.random() * letters.length));
ctx.fillText(text, i * fontSize, drops[i] * fontSize);

if(drops[i] * fontSize > canvas.height && Math.random() > 0.975)
drops[i] = 0;

drops[i]++;
}
}

setInterval(drawMatrix, 35);

/* TERMINAL TYPING */
const terminal = document.getElementById("terminal");
const lines = [
"$ whoami",
"气VENØM三ノ乙",
"",
"$ status",
"Initializing systems...",
"Access granted.",
"Learning. Building. Evolving."
];

let lineIndex = 0;
let charIndex = 0;

function typeLine(){
if(lineIndex < lines.length){
if(charIndex < lines[lineIndex].length){
terminal.innerHTML += lines[lineIndex].charAt(charIndex);
charIndex++;
setTimeout(typeLine, 40);
} else {
terminal.innerHTML += "<br>";
charIndex = 0;
lineIndex++;
setTimeout(typeLine, 400);
}
}
}

setTimeout(typeLine, 3500);

</script>

</body>
</html>
