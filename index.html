<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>气VENØM三ノ乙 | Cyber Terminal</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Consolas, monospace;
}

body{
background:#000;
color:#00ff41;
overflow-x:hidden;
text-align:center;
}

/* MATRIX CANVAS */
canvas{
position:fixed;
top:0;
left:0;
z-index:-2;
}

/* ===== LOADER ===== */
#loader{
position:fixed;
width:100%;
height:100vh;
background:#000;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:999;
color:#00ff41;
}

.loader-text{
margin-bottom:20px;
font-size:18px;
letter-spacing:2px;
animation:blink 1s infinite;
}

.loading-bar{
width:260px;
height:6px;
background:#111;
border-radius:5px;
overflow:hidden;
}

.loading-progress{
height:100%;
width:0%;
background:#00ff41;
animation:load 3s forwards;
}

@keyframes load{
to{width:100%;}
}

@keyframes blink{
50%{opacity:0.5;}
}

/* CONTAINER */
.container{
padding:80px 20px;
position:relative;
z-index:2;
display:none; /* hidden until loader ends */
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

/* PROFILE */
.profile-img{
width:150px;
height:150px;
border-radius:50%;
border:3px solid #00ff41;
box-shadow:0 0 20px #00ff41,0 0 50px #00ff41;
margin:0 auto 25px auto;
display:block;
}

/* ===== TEXT SCAN EFFECT (ONLY INSIDE TEXT) ===== */
.glitch{
position:relative;
display:inline-block;
font-size:42px;
font-weight:bold;
color:#00ff41;
letter-spacing:2px;
text-shadow:0 0 10px #00ff41,0 0 30px #00ff41;
overflow:hidden;
}

.glitch::after{
content:"";
position:absolute;
left:0;
width:100%;
height:40%;
background:linear-gradient(
to bottom,
transparent,
rgba(0,255,65,0.8),
transparent
);
animation:scan 3s linear infinite;
pointer-events:none;
}

@keyframes scan{
0%{top:-50%;}
100%{top:120%;}
}

.subtitle{
color:#00ff41;
margin:20px 0 40px;
opacity:0.8;
}

/* BUTTONS */
.buttons{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:15px;
margin-bottom:50px;
}

.buttons a{
text-decoration:none;
}

.buttons button{
padding:12px 25px;
background:#00ff41;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
color:black;
}

.buttons button:hover{
transform:scale(1.08);
box-shadow:0 0 20px #00ff41;
}

/* TERMINAL */
.terminal{
background:#000;
border:1px solid #00ff41;
padding:20px;
max-width:650px;
margin:40px auto;
text-align:left;
box-shadow:0 0 25px #00ff41;
min-height:140px;
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
<div class="loader-text">LOADING 气VENØM三ノ乙 WEB...</div>
<div class="loading-bar">
<div class="loading-progress"></div>
</div>
</div>

<!-- MATRIX -->
<canvas id="matrix"></canvas>

<div class="container" id="mainContent">

<img src="profile.jpg" class="profile-img">

<h1 class="glitch">Hi, I'm 气VENØM三ノ乙</h1>

<p class="subtitle">
Learning, building, and experimenting with code & security.
</p>

<div class="buttons">
<a href="https://t.me/BGMI_X_VENOM" target="_blank"><button>Telegram</button></a>
<a href="https://github.com/BGMIxVENOM" target="_blank"><button>GitHub</button></a>
<a href="https://www.facebook.com/BGMI.Pritam.Halder" target="_blank"><button>Facebook</button></a>
<a href="https://wa.me/916289716808" target="_blank"><button>WhatsApp</button></a>
</div>

<div class="terminal" id="terminal"></div>

</div>

<script>

/* LOADER CONTROL */
setTimeout(()=>{
document.getElementById("loader").style.display="none";
document.getElementById("mainContent").style.display="flex";
},3000);

/* MATRIX RAIN */
const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

const letters="アカサタナハマヤラ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const fontSize=14;
const columns=canvas.width/fontSize;
const drops=[];

for(let i=0;i<columns;i++){
drops[i]=1;
}

function draw(){
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00ff41";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){
const text=letters.charAt(Math.floor(Math.random()*letters.length));
ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height&&Math.random()>0.975){
drops[i]=0;
}
drops[i]++;
}
}

setInterval(draw,33);

/* TERMINAL TYPING */
const terminal=document.getElementById("terminal");
const lines=[
"✪═━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━═✪",
"$ whoami",
"气VENØM三ノ乙",
"",
"$ status",
"气VENØM三ノ乙 system online...",
"",
"Learning. Building. Evolving.",
"",
"",
"Access granted.",
"✪═━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━═✪"
];

let lineIndex=0;
let charIndex=0;

function typeLine(){
if(lineIndex<lines.length){
if(charIndex<lines[lineIndex].length){
terminal.innerHTML+=lines[lineIndex].charAt(charIndex);
charIndex++;
setTimeout(typeLine,40);
}else{
terminal.innerHTML+="<br>";
lineIndex++;
charIndex=0;
setTimeout(typeLine,400);
}
}
}

setTimeout(typeLine,3500);

</script>

</body>
</html>
