<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>气VENØM三ノ乙 | Cyber Portfolio</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Consolas, monospace;
}

body{
background:black;
color:#00f5d4;
overflow-x:hidden;
}

/* MATRIX CANVAS */
canvas{
position:fixed;
top:0;
left:0;
z-index:-2;
}

/* SCANLINE OVERLAY */
body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:repeating-linear-gradient(
to bottom,
rgba(0,255,200,0.05) 0px,
rgba(0,255,200,0.05) 1px,
transparent 2px,
transparent 4px
);
pointer-events:none;
z-index:-1;
}

/* LOADING SCREEN */
#loader{
position:fixed;
width:100%;
height:100vh;
background:black;
display:flex;
justify-content:center;
align-items:center;
color:#00f5d4;
font-size:20px;
z-index:999;
animation:fadeOut 3s forwards 2.5s;
}

@keyframes fadeOut{
to{opacity:0;visibility:hidden;}
}

/* MAIN CONTAINER */
.container{
text-align:center;
padding:60px 20px;
}

/* PROFILE */
.profile-img{
width:150px;
height:150px;
border-radius:50%;
border:3px solid #00f5d4;
box-shadow:0 0 25px #00f5d4;
margin-bottom:20px;
}

/* CLEAN CYBER GLITCH */
.glitch{
position:relative;
font-size:38px;
font-weight:bold;
color:#00f5d4;
letter-spacing:2px;
animation:flicker 3s infinite alternate;
text-shadow:
0 0 5px #00f5d4,
0 0 15px #00f5d4;
}

.glitch::before,
.glitch::after{
content:attr(data-text);
position:absolute;
left:0;
top:0;
width:100%;
opacity:0.3;
}

.glitch::before{
color:#00ffff;
animation:glitchTop 3s infinite alternate;
}

.glitch::after{
color:#00ffcc;
animation:glitchBottom 2.5s infinite alternate;
}

@keyframes glitchTop{
0%{transform:translate(0);}
50%{transform:translate(-1px,1px);}
100%{transform:translate(0);}
}

@keyframes glitchBottom{
0%{transform:translate(0);}
50%{transform:translate(1px,-1px);}
100%{transform:translate(0);}
}

@keyframes flicker{
0%,100%{opacity:1;}
50%{opacity:0.9;}
}

/* SUBTEXT */
.sub{
color:#aaa;
margin:15px 0 30px;
}

/* BUTTONS */
.buttons{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:15px;
margin-bottom:40px;
}

.buttons a{
text-decoration:none;
}

.buttons button{
padding:12px 25px;
border:none;
border-radius:8px;
background:#00f5d4;
color:black;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.buttons button:hover{
transform:scale(1.05);
box-shadow:0 0 20px #00f5d4;
}

/* TERMINAL */
.terminal{
background:#000;
border:1px solid #00f5d4;
padding:20px;
max-width:650px;
margin:40px auto;
text-align:left;
box-shadow:0 0 20px #00f5d4;
min-height:120px;
}

/* Cursor */
.cursor{
display:inline-block;
width:10px;
background:#00f5d4;
animation:blink 1s infinite;
}

@keyframes blink{
50%{opacity:0;}
}
</style>
</head>

<body>

<div id="loader">
Initializing System...
</div>

<canvas id="matrix"></canvas>

<div class="container">

<img src="profile.jpg" class="profile-img">

<h1 class="glitch" data-text="Hi, I'm 气VENØM三ノ乙">
Hi, I'm 气VENØM三ノ乙
</h1>

<p class="sub">Learning, building, and experimenting with code & security.</p>

<div class="buttons">
<a href="https://t.me/BGMI_X_VENOM" target="_blank"><button>Telegram</button></a>
<a href="https://github.com/BGMIxVENOM" target="_blank"><button>GitHub</button></a>
<a href="https://www.facebook.com/BGMI.Pritam.Halder" target="_blank"><button>Facebook</button></a>
<a href="https://wa.me/916289716808" target="_blank"><button>WhatsApp</button></a>
</div>

<div class="terminal" id="terminal"></div>

</div>

<script>
/* MATRIX RAIN */
const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

const letters="アカサタナハマヤラワ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const fontSize=14;
const columns=canvas.width/fontSize;
const drops=[];

for(let i=0;i<columns;i++){
drops[i]=1;
}

function draw(){
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00f5d4";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){
const text=letters.charAt(Math.floor(Math.random()*letters.length));
ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height&&Math.random()>0.975){
drops[i]=0;
}
drops[i]++;
}
}

setInterval(draw,33);

/* TERMINAL TYPING */
const terminal=document.getElementById("terminal");
const lines=[
"$ whoami",
"气VENØM三ノ乙",
"",
"$ status",
"Initializing systems...",
"Access granted.",
"Learning. Building. Evolving."
];

let lineIndex=0;
let charIndex=0;

function typeLine(){
if(lineIndex<lines.length){
if(charIndex<lines[lineIndex].length){
terminal.innerHTML+=lines[lineIndex].charAt(charIndex);
charIndex++;
setTimeout(typeLine,40);
}else{
terminal.innerHTML+="<br>";
lineIndex++;
charIndex=0;
setTimeout(typeLine,400);
}
}
}

setTimeout(typeLine,1500);
</script>

</body>
</html>
